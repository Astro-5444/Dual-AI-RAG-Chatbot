<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- Add FontAwesome from cdnjs directly for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-brain"></i> RAG AI Chat</h2>
                <p>Chat with your PDFs</p>
            </div>
            
            <div class="upload-section">
                <form id="uploadForm" enctype="multipart/form-data">
                    <label for="fileInput" class="upload-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Upload PDF
                    </label>
                    <input type="file" id="fileInput" name="file" accept=".pdf" style="display: none;">
                </form>
                <div id="uploadStatus" class="status-msg"></div>
            </div>

            <div class="document-section">
                <h3><i class="fa-solid fa-file-pdf"></i> Available PDFs</h3>
                <div class="custom-select">
                    <select id="pdfSelect" class="styled-select">
                        <option value="">All Documents</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="clearBtn" class="danger-btn"><i class="fa-solid fa-trash-can"></i> Clear History</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="current-doc">
                    <span id="headerDocName">Global Knowledge Base</span>
                    <span class="badge">Active</span>
                </div>
                <div class="system-status">
                    <span class="indicator"></span> Ready
                </div>
            </header>

            <div id="chatMessages" class="chat-messages">
                <div class="message system-msg">
                    <div class="msg-bubble">
                        <i class="fa-solid fa-robot"></i> Hello! Select a PDF from the sidebar or search all documents. How can I help you today?
                    </div>
                </div>
                <!-- Chat messages go here -->
            </div>

            <div class="chat-input-container">
                <div id="aiStatus" class="ai-status" style="display: none;">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> <span id="statusText">Thinking...</span>
                </div>
                <form id="chatForm" class="chat-form">
                    <input type="text" id="chatInput" placeholder="Ask a question about the document..." autocomplete="off">
                    <button type="submit" id="sendBtn" class="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
